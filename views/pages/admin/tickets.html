<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets — Meverik Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } svg { width: 1rem; height: 1rem; } button { cursor: pointer; } .btn-signout:hover { background:#F9FAFB; color:#374151; border-color:#D1D5DB; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="flex min-h-screen">
  <aside class="w-52 min-w-52 bg-white border-r border-gray-100 flex flex-col sticky top-0 h-screen">
    <div class="px-5 py-5 border-b border-gray-100"><div class="text-base font-semibold">Meverik<span class="teal">.</span> <span class="text-xs font-normal text-gray-400">Admin</span></div></div>
    <nav class="flex-1 py-3 flex flex-col gap-0.5">
      <a href="/admin" class="flex items-center gap-2.5 px-5 py-2.5 text-sm font-medium teal bg-teal-soft border-l-2 border-teal"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>Tickets</a>
      <a href="/admin/clients" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clients</a>
      <a href="/admin/tokens" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Tokens</a>
      <a href="/admin/payments" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>Payments</a>
      <a href="/admin/settings" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-100"><div class="text-sm font-medium text-gray-700">Admin</div><button id="logout-btn" class="btn-signout mt-3 w-full text-xs text-gray-400 border border-gray-200 rounded-lg py-2 transition-all">Sign out</button></div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between">
      <h1 class="text-base font-semibold">Tickets</h1>
      <div class="flex items-center gap-3">
        <select id="status-filter" class="text-xs border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none">
          <option value="">All tickets</option>
          <option value="new">New</option>
          <option value="in_progress">In progress</option>
          <option value="in_review">In review</option>
          <option value="blocked">Blocked</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>
    </header>

    <main class="flex-1 p-6">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-gray-100 rounded-xl p-4"><div class="text-xs text-gray-400 mb-1.5">Open tickets</div><div class="text-2xl font-semibold" id="m-open">—</div></div>
        <div class="bg-gray-100 rounded-xl p-4"><div class="text-xs text-gray-400 mb-1.5">Delivered this week</div><div class="text-2xl font-semibold" id="m-delivered">—</div></div>
        <div class="bg-gray-100 rounded-xl p-4"><div class="text-xs text-gray-400 mb-1.5">In progress</div><div class="text-2xl font-semibold" id="m-progress">—</div></div>
        <div class="bg-gray-100 rounded-xl p-4"><div class="text-xs text-gray-400 mb-1.5">Blocked</div><div class="text-2xl font-semibold text-red-500" id="m-blocked">—</div></div>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
        <div class="grid grid-cols-12 gap-3 px-5 py-3 bg-gray-50 text-xs font-medium text-gray-400 uppercase tracking-wide border-b border-gray-100">
          <div class="col-span-3">Client</div>
          <div class="col-span-3">Request</div>
          <div class="col-span-1">Type</div>
          <div class="col-span-2">Status</div>
          <div class="col-span-1">Tokens</div>
          <div class="col-span-1">Date</div>
          <div class="col-span-1"></div>
        </div>
        <div id="tickets-list"><div class="px-5 py-10 text-center text-sm text-gray-400">Loading...</div></div>
      </div>
    </main>
  </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
    <h2 class="text-base font-semibold mb-4">Update ticket status</h2>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
      <select id="modal-status" class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-300">
        <option value="new">New</option>
        <option value="in_progress">In progress</option>
        <option value="in_review">In review</option>
        <option value="delivered">Delivered</option>
        <option value="blocked">Blocked</option>
      </select>
    </div>
    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Internal note (optional)</label>
      <textarea id="modal-notes" rows="3" placeholder="Add a note for your team..." class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-300 resize-none"></textarea>
    </div>
    <div class="flex gap-3">
      <button id="modal-cancel" class="flex-1 border border-gray-200 text-gray-500 text-sm py-2.5 rounded-lg hover:bg-gray-50">Cancel</button>
      <button id="modal-save" class="flex-1 bg-teal text-white text-sm font-medium py-2.5 rounded-lg hover-teal transition-all">Save</button>
    </div>
  </div>
</div>

<script src="/js/admin-tickets.js"></script>
</body>
</html>
