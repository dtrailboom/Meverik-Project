<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets — Meverik Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="sidebar-overlay" class="sidebar-overlay"></div>
<div class="app-shell">
  <aside id="app-sidebar" class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Meverik<span class="brand-dot">.</span> <span class="sidebar-tag">Admin</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item is-active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>Tickets</a>
      <a href="/admin/clients" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Clients</a>
      <a href="/admin/tokens" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Tokens</a>
      <a href="/admin/payments" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>Payments</a>
      <a href="/admin/settings" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-name">Admin</div>
      <button id="logout-btn" class="btn btn-outline btn-block btn-sm">Sign out</button>
    </div>
  </aside>

  <div class="app-body">
    <header class="app-header">
      <div class="app-header-left">
        <button id="hamburger-btn" class="hamburger" aria-label="Open menu"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <h1>Tickets</h1>
      </div>
      <div class="app-header-left">
        <select id="status-filter" class="select-sm">
          <option value="">All tickets</option>
          <option value="new">New</option>
          <option value="in_progress">In progress</option>
          <option value="in_review">In review</option>
          <option value="blocked">Blocked</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>
    </header>

    <main class="app-main">
      <div class="metric-grid-4">
        <div class="metric"><div class="metric-label">Open tickets</div><div class="metric-value" id="m-open">—</div></div>
        <div class="metric"><div class="metric-label">Delivered this week</div><div class="metric-value" id="m-delivered">—</div></div>
        <div class="metric"><div class="metric-label">In progress</div><div class="metric-value" id="m-progress">—</div></div>
        <div class="metric"><div class="metric-label">Blocked</div><div class="metric-value is-danger" id="m-blocked">—</div></div>
      </div>

      <div class="card card-clip tbl-tickets table-scroll">
        <div class="dgrid dgrid-head">
          <div class="col-client">Client</div>
          <div class="col-request">Request</div>
          <div class="col-type">Type</div>
          <div class="col-status">Status</div>
          <div class="col-tokens">Tokens</div>
          <div class="col-date">Date</div>
          <div class="col-action"></div>
        </div>
        <div id="tickets-list"><div class="empty-state">Loading...</div></div>
      </div>
    </main>
  </div>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-card">
    <h2 class="modal-title">Manage ticket</h2>

    <div class="field">
      <div class="field-label">Request details</div>
      <div id="modal-details" class="modal-details">—</div>
    </div>

    <div class="field">
      <label class="field-label" for="modal-status">Status</label>
      <select id="modal-status" class="select">
        <option value="new">New</option>
        <option value="in_progress">In progress</option>
        <option value="in_review">In review</option>
        <option value="delivered">Delivered</option>
        <option value="blocked">Blocked</option>
      </select>
    </div>

    <div class="field">
      <label class="field-label" for="modal-notes">Internal note (optional)</label>
      <textarea id="modal-notes" rows="3" placeholder="Add a note for your team..." class="textarea"></textarea>
    </div>

    <div class="field">
      <label class="field-label" for="modal-reply">Reply to client (shown in their portal)</label>
      <textarea id="modal-reply" rows="3" placeholder="Write a reply the client will see..." class="textarea"></textarea>
    </div>

    <div class="btn-row">
      <button id="modal-cancel" class="btn btn-outline">Cancel</button>
      <button id="modal-save" class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<script src="/js/admin-tickets.js"></script>
<script>
  (function(){
    var btn = document.getElementById('hamburger-btn');
    var sb = document.getElementById('app-sidebar');
    var ov = document.getElementById('sidebar-overlay');
    function openMenu(){ sb.classList.add('sidebar-open'); ov.classList.add('show'); }
    function closeMenu(){ sb.classList.remove('sidebar-open'); ov.classList.remove('show'); }
    if(btn) btn.addEventListener('click', openMenu);
    if(ov) ov.addEventListener('click', closeMenu);
    if(sb) sb.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeMenu); });
  })();
</script>
</body>
</html>
