<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Meverik</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<nav class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand">Meverik<span class="brand-dot">.</span></a>
    <a href="/auth/register" class="topbar-link">New here? <span class="link-accent">Create an account</span></a>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card-wrap">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Log in to manage your website and tickets.</p>
    </div>

    <div id="error-banner" class="alert alert-error auth-banner hidden" role="alert"></div>

    <div class="card card-2xl auth-card">
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@business.at" class="input">
      </div>
      <div class="field">
        <div class="field-label-row">
          <label class="field-label" for="password">Password</label>
          <a href="mailto:admin@meverik.at?subject=Password%20reset" class="link-accent">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <input id="password" type="password" autocomplete="current-password" placeholder="Your password" class="input input-with-icon">
          <button type="button" id="toggle-password" class="input-icon-btn" aria-label="Show password">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <button id="login-btn" type="button" class="btn btn-primary btn-block">Log in</button>
    </div>

    <p class="auth-footnote">
      Don't have an account?
      <a href="/auth/register" class="link-accent">Create one</a>
    </p>
  </div>
</main>

<footer class="site-footer">
  © 2026 Meverik · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
</footer>
<script src="/js/login.js"></script>
</body>
</html>
