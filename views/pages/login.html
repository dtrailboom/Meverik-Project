<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Meverik</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .teal { color: #1D9E75; }
    .bg-teal { background-color: #1D9E75; }
    .hover-teal:hover { background-color: #0F6E56; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="/" class="text-lg font-semibold">Meverik<span class="teal">.</span></a>
      <a href="/auth/register" class="text-sm text-gray-500 hover:text-gray-900">No account? <span class="teal font-medium">Sign up</span></a>
    </div>
  </nav>

  <!-- Form -->
  <div class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-sm">

      <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold mb-2">Welcome back</h1>
        <p class="text-sm text-gray-400">Log in to your Meverik portal</p>
      </div>

      <!-- Error banner (hidden by default) -->
      <div id="error-banner" class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3" role="alert"></div>

      <div class="bg-white border border-gray-200 rounded-2xl p-7 space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email">Email address</label>
          <input
            id="email"
            type="email"
            autocomplete="email"
            placeholder="hello@yourbusiness.com"
            class="w-full text-sm border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent transition-all"
          />
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-medium text-gray-700" for="password">Password</label>
            <a href="/auth/forgot-password" class="text-xs teal hover:underline">Forgot password?</a>
          </div>
          <div class="relative">
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full text-sm border border-gray-200 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent transition-all"
            />
            <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" aria-label="Show password">
              <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>

        <button
          id="login-btn"
          type="button"
          class="w-full bg-teal text-white font-medium text-sm py-3 rounded-lg hover-teal transition-all flex items-center justify-center gap-2"
        >
          Log in
        </button>

      </div>

      <p class="text-center text-xs text-gray-400 mt-6">
        Don't have an account?
        <a href="/auth/register" class="teal font-medium hover:underline">Sign up free</a>
      </p>

    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-6 text-xs text-gray-300 border-t border-gray-100">
    © 2026 Meverik · <a href="/privacy" class="hover:text-gray-400">Privacy</a> · <a href="/terms" class="hover:text-gray-400">Terms</a>
  </footer>

  <script>
    // Toggle password visibility
    const toggleBtn = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const isHidden = passwordInput.type === 'password';
      passwordInput.type = isHidden ? 'text' : 'password';
      document.getElementById('eye-icon').innerHTML = isHidden
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    });

    // Submit login
    const btn = document.getElementById('login-btn');
    const errorBanner = document.getElementById('error-banner');

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg> Logging in…'
        : 'Log in';
    }

    btn.addEventListener('click', async () => {
      errorBanner.classList.add('hidden');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.redirect || '/portal';
        } else {
          showError(data.error || 'Login failed. Please try again.');
        }
      } catch (err) {
        showError('Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>

</body>
</html>
