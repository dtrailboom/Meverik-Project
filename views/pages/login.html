<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Meverik</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } svg { width: 1rem; height: 1rem; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<nav class="bg-white border-b border-gray-100 px-6 py-4">
  <div class="max-w-5xl mx-auto flex items-center justify-between">
    <a href="/" class="text-lg font-semibold">Meverik<span class="teal">.</span></a>
    <a href="/auth/register" class="text-sm text-gray-500 hover:text-gray-900">New here? <span class="teal font-medium">Create an account</span></a>
  </div>
</nav>

<div class="flex-1 flex items-center justify-center px-6 py-14">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold mb-2">Welcome back</h1>
      <p class="text-sm text-gray-400">Log in to manage your website and tickets.</p>
    </div>

    <div id="error-banner" class="hidden mb-5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3" role="alert"></div>

    <div class="bg-white border border-gray-200 rounded-2xl p-7 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@business.at" class="w-full text-sm border border-gray-200 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent transition-all">
      </div>
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-medium text-gray-700" for="password">Password</label>
          <a href="mailto:admin@meverik.at?subject=Password%20reset" class="text-xs teal hover:underline">Forgot password?</a>
        </div>
        <div class="relative">
          <input id="password" type="password" autocomplete="current-password" placeholder="Your password" class="w-full text-sm border border-gray-200 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-transparent transition-all">
          <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" aria-label="Show password">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <button id="login-btn" type="button" class="w-full mt-2 bg-teal text-white font-medium text-sm py-3 rounded-lg hover-teal transition-all flex items-center justify-center gap-2">Log in</button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Don't have an account?
      <a href="/auth/register" class="teal font-medium hover:underline">Create one</a>
    </p>
  </div>
</div>

<footer class="text-center py-6 text-xs text-gray-300 border-t border-gray-100">
  © 2026 Meverik · <a href="/privacy" class="hover:text-gray-400">Privacy</a> · <a href="/terms" class="hover:text-gray-400">Terms</a>
</footer>
<script src="/js/login.js"></script>
</body>
</html>
