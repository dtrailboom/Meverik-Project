<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Meverik</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<nav class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand">Meverik<span class="brand-dot">.</span></a>
    <a href="/auth/login" class="topbar-link">Remember it? <span class="link-accent">Log in</span></a>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card-wrap">
    <div class="auth-header">
      <h1>Forgot your password?</h1>
      <p>Enter your email and we'll send you a reset link.</p>
    </div>

    <div id="error-banner"   class="alert alert-error   auth-banner hidden" role="alert"></div>
    <div id="success-banner" class="alert alert-success auth-banner hidden" role="status"></div>

    <div class="card card-2xl auth-card">
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@business.at" class="input">
      </div>
      <button id="submit-btn" type="button" class="btn btn-primary btn-block">Send reset link</button>
    </div>

    <p class="auth-footnote">
      Back to <a href="/auth/login" class="link-accent">Log in</a>
    </p>
  </div>
</main>

<footer class="site-footer">
  © 2026 Meverik · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a>
</footer>
<script src="/js/forgot-password.js"></script>
</body>
</html>
