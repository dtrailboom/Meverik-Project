<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing — Meverik Portal</title>
  <link rel="stylesheet" href="/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; } svg { width: 1rem; height: 1rem; } button { cursor: pointer; } .btn-signout:hover { background:#F9FAFB; color:#374151; border-color:#D1D5DB; }
    /* Mobile sidebar (hamburger) */
    #app-sidebar { transition: transform 0.25s ease; }
    @media (max-width: 767px) {
      #app-sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; transform: translateX(-100%); }
      #app-sidebar.sidebar-open { transform: translateX(0); }
      #sidebar-overlay { display: none; position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.3); z-index: 40; }
      #sidebar-overlay.show { display: block; }
    }
    @media (min-width: 768px) { #hamburger-btn { display: none; } }
  
    @media (max-width: 767px) {
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-scroll .grid-cols-12 { min-width: 640px; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="sidebar-overlay"></div>
  <div class="flex min-h-screen">
  <aside id="app-sidebar" class="w-52 min-w-52 bg-white border-r border-gray-100 flex flex-col sticky top-0 h-screen">
    <div class="px-5 py-5 border-b border-gray-100"><div class="text-base font-semibold">Meverik<span class="teal">.</span></div><div class="text-xs text-gray-400 mt-0.5" id="sidebar-business">Loading...</div></div>
    <nav class="flex-1 py-3 flex flex-col gap-0.5">
      <a href="/portal" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Overview</a>
      <a href="/portal/request" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>New request</a>
      <a href="/portal/tickets" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>My tickets</a>
      <a href="/portal/topup" class="flex items-center gap-2.5 px-5 py-2.5 text-sm text-gray-500 hover:bg-gray-50 border-l-2 border-transparent transition-all"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Top up tokens</a>
      <a href="/portal/billing" class="flex items-center gap-2.5 px-5 py-2.5 text-sm font-medium teal bg-teal-soft border-l-2 border-teal"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>Billing</a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-100"><div class="text-sm font-medium text-gray-700" id="sidebar-name">...</div><div class="text-xs text-gray-400" id="sidebar-plan">...</div><button id="logout-btn" class="btn-signout mt-3 w-full text-xs text-gray-400 border border-gray-200 rounded-lg py-2 transition-all">Sign out</button></div>
  </aside>

  <div class="flex-1 flex flex-col">
    <header class="bg-white border-b border-gray-100 px-6 py-4">
        <div class="flex items-center gap-3"><button id="hamburger-btn" aria-label="Open menu" class="text-gray-500 hover:text-gray-900 transition-all" style="cursor:pointer;"><svg style="width:1.5rem;height:1.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button><h1 class="text-base font-semibold">Billing</h1></div>
    </header>
    <main class="flex-1 p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5 max-w-3xl">
        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden table-scroll">
          <div class="px-5 py-3.5 border-b border-gray-100"><span class="text-sm font-medium">Current plan</span></div>
          <div class="p-5">
            <div class="text-2xl font-semibold capitalize mb-1" id="plan-name">—</div>
            <div class="text-sm text-gray-400 mb-4" id="plan-details">Loading...</div>
            <div id="past-due-banner" class="hidden mb-3 bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-xs text-red-600">Payment failed — please update your payment method.</div>
            <div class="flex gap-2">
              <a href="/auth/register" class="flex-1 text-center text-xs teal border border-teal bg-teal-soft rounded-lg py-2 hover:bg-green-100 transition-all">Upgrade plan</a>
              <button class="flex-1 text-xs text-gray-500 border border-gray-200 rounded-lg py-2 hover:bg-gray-50 transition-all">Cancel plan</button>
            </div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden table-scroll">
          <div class="px-5 py-3.5 border-b border-gray-100"><span class="text-sm font-medium">Payment method</span></div>
          <div class="p-5">
            <div class="flex items-center gap-3 mb-4">
              <div class="bg-gray-100 rounded-lg px-3 py-1.5 text-xs font-semibold text-gray-600">VISA</div>
              <div>
                <div class="text-sm text-gray-700">•••• •••• •••• 4242</div>
                <div class="text-xs text-gray-400">Managed via Stripe</div>
              </div>
            </div>
            <button class="w-full text-xs text-gray-500 border border-gray-200 rounded-lg py-2 hover:bg-gray-50 transition-all">Update payment method</button>
          </div>
        </div>
      </div>

      <div class="bg-white border border-gray-200 rounded-xl overflow-hidden max-w-3xl">
        <div class="px-5 py-3.5 border-b border-gray-100"><span class="text-sm font-medium">Billing history</span></div>
        <div class="grid grid-cols-12 gap-4 px-5 py-3 bg-gray-50 text-xs font-medium text-gray-400 uppercase tracking-wide border-b border-gray-100">
          <div class="col-span-5">Description</div><div class="col-span-3">Type</div><div class="col-span-2">Amount</div><div class="col-span-2">Date</div>
        </div>
        <div id="transactions-list"><div class="px-5 py-8 text-center text-sm text-gray-400">Loading...</div></div>
      </div>
    </main>
  </div>
</div>
<script src="/js/portal-billing.js"></script>
<script>
  (function(){
    var btn = document.getElementById('hamburger-btn');
    var sb = document.getElementById('app-sidebar');
    var ov = document.getElementById('sidebar-overlay');
    function openMenu(){ sb.classList.add('sidebar-open'); ov.classList.add('show'); }
    function closeMenu(){ sb.classList.remove('sidebar-open'); ov.classList.remove('show'); }
    if(btn) btn.addEventListener('click', openMenu);
    if(ov) ov.addEventListener('click', closeMenu);
    if(sb) sb.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', closeMenu); });
  })();
  </script>
</body>
</html>
